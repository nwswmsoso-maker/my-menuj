<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو الفخامة - نسخة النيون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-pink: #ff007f;
            --dark-black: #050505;
            --card-bg: #121212;
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--dark-black); color: white; overflow-x: hidden;
        }

        /* لوحة التحكم الجانبية - بدون خطوط */
        .sidebar {
            position: fixed; top: 0; right: -300px;
            width: 280px; height: 100%; background: #0a0a0a;
            z-index: 1000; transition: 0.5s; padding: 30px 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.9);
        }
        .sidebar.active { right: 0; }
        .sidebar-header { text-align: center; margin-bottom: 40px; }
        .sidebar-link {
            display: flex; align-items: center; padding: 15px;
            color: white; text-decoration: none; margin-bottom: 10px;
            border-radius: 12px; background: rgba(255, 255, 255, 0.03);
        }

        /* الهيدر مع تأثير النيون المتحرك */
        .header {
            height: 250px;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=1350&q=80') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--primary-pink);
        }

        /* حركة النيون */
        .neon-title {
            font-size: 35px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 3px;
            /* توهج النيون الأساسي */
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--primary-pink), 0 0 40px var(--primary-pink), 0 0 60px var(--primary-pink);
            /* استدعاء الحركة */
            animation: neon-glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes neon-glow {
            from {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--primary-pink), 0 0 40px var(--primary-pink);
                transform: scale(1);
            }
            to {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px var(--primary-pink), 0 0 80px var(--primary-pink), 0 0 100px var(--primary-pink);
                transform: scale(1.05); /* حركة تكبير بسيطة مع التوهج */
            }
        }

        .menu-toggle { position: absolute; top: 25px; right: 25px; font-size: 28px; color: var(--primary-pink); cursor: pointer; }

        /* البحث والمنتجات */
        .search-area { padding: 0 25px; margin-top: -30px; }
        .search-wrapper {
            background: #1a1a1a; border-radius: 15px; padding: 12px 20px;
            display: flex; align-items: center; border: 1px solid var(--primary-pink);
        }
        .search-wrapper input { background: transparent; border: none; color: white; width: 100%; outline: none; font-family: 'Cairo'; }

        .food-grid { padding: 30px 20px 100px 20px; }
        .food-card {
            background: var(--card-bg); border-radius: 20px; display: flex;
            margin-bottom: 20px; overflow: hidden; border: 1px solid #222;
        }
        .food-img { width: 130px; height: 130px; object-fit: cover; }
        .food-info { padding: 15px; flex: 1; position: relative; }
        .food-price { color: var(--primary-pink); font-weight: 900; font-size: 18px; display: block; margin-top: 10px; }
        .buy-btn { background: var(--primary-pink); color: white; border: none; padding: 8px 15px; border-radius: 10px; position: absolute; bottom: 15px; left: 15px; font-family: 'Cairo'; font-weight: bold; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 style="color: var(--primary-pink);">لوحة التحكم</h3>
        </div>
        <a href="#" class="sidebar-link"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="#" class="sidebar-link"><i class="fas fa-phone"></i> اتصل بنا</a>
    </div>

    <header class="header">
        <div class="menu-toggle" id="openSidebar"><i class="fas fa-bars"></i></div>
        <h2 class="neon-title">سناك جكن 99</h2>
    </header>

    <div class="search-area">
        <div class="search-wrapper">
            <i class="fas fa-search" style="color: var(--primary-pink);"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن وجبتك الفخمة...">
        </div>
    </div>

    <div class="food-grid" id="foodItems">
        <div class="food-card">
            <img class="food-img" src="https://img.freepik.com/free-photo/double-beef-burger-with-cheese-and-vegetables_114579-2514.jpg">
            <div class="food-info">
                <h3>بركر دبل فخامة</h3>
                <p>لحم عراقي طازج مع الجبن</p>
                <span class="food-price">12,500 د.ع</span>
                <button class="buy-btn">اطلب</button>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openSidebar');
        openBtn.onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); }
        overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); }

        const searchInput = document.getElementById('searchInput');
        const foodCards = document.getElementsByClassName('food-card');
        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase();
            Array.from(foodCards).forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(filter) ? "flex" : "none";
            });
        });
    </script>
</body>
</html>
